version: "5.0"
services:
  app:
    container_name: "app"
    build: "."
    restart: always
    env_file:
      - "./app/.env"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - test_db

  db:
    container_name: "db"
    image: postgres:16.0-alpine
    restart: always
    env_file:
      - "./app/.env"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    container_name: "redis"
    image: redis:7
    ports:
      - "6379:6379"

  test_db:
    container_name: "test_db"
    image: postgres:16.0-alpine
    restart: always
    env_file:
      - "./tests/.env"
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
  
  test_redis:
    container_name: "test_redis"
    image: redis:7
    ports:
      - "6378:6379"

  redis_gui:
    container_name: "redis_gui"
    image: redis/redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  postgres_data:
  test_postgres_data: